<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הצטרפות לקבוצת ווטסאפ</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0f1117; --surface: #1a1d27; --border: #2e3148; --accent: #4f8ef7; --green: #4fd18a; --text: #e8eaf0; --muted: #8890a8; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; direction: rtl; padding: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; max-width: 440px; width: 100%; text-align: center; }
  .logo { font-size: 48px; margin-bottom: 16px; }
  .title { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
  .subtitle { font-size: 15px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
  .btn-wa { display: inline-flex; align-items: center; gap: 10px; background: #25D366; color: white; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 700; padding: 14px 32px; border-radius: 12px; text-decoration: none; transition: opacity 0.15s; margin-top: 8px; }
  .btn-wa:hover { opacity: 0.85; }
  .spinner-wrap { padding: 40px 0; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: #f7774f; font-size: 14px; margin-top: 16px; }
  .badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-bottom: 20px; }
  .badge-green  { background: rgba(79,209,138,0.15); color: var(--green); }
  .badge-blue   { background: rgba(79,142,247,0.15); color: var(--accent); }
  .badge-yellow { background: rgba(247,201,79,0.15);  color: #f7c94f; }
  .badge-purple { background: rgba(176,126,247,0.15); color: #b07ef7; }
  .badge-orange { background: rgba(247,119,79,0.15);  color: #f7774f; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div style="color:var(--muted);font-size:14px">מחפש את הקבוצה המתאימה...</div>
  </div>
</div>

<script>
// ===== הגדרות =====
var SHEET_ID = '1A6EPgnd0cax-KDjGtV1D1mXnhNE1mie1FCJLljybEgI';
var SHEET_NAME = 'קישורים לקבוצות ווטסאפ';

var AUDIENCE_BADGE = {
  'ילדים': 'badge-green', 'נוער': 'badge-blue',
  'קשישים': 'badge-yellow', 'אקו': 'badge-purple', 'ערבית': 'badge-orange'
};

var AUDIENCE_LABEL = {
  'ילדים': 'קבוצת הורים לילדים',
  'נוער': 'קבוצת נוער',
  'קשישים': 'קבוצת קשישים',
  'אקו': 'קבוצת אקו',
  'ערבית': 'קבוצה בערבית',
};

// קרא קהל יעד מה-URL: ?q=ילדים
var params = new URLSearchParams(window.location.search);
var audience = params.get('q') || '';

if (!audience) {
  showError('לא צוין קהל יעד בקישור.');
} else {
  loadGroup();
}

function loadGroup() {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(SHEET_NAME) + '&t=' + Date.now();

  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var json = text.replace(/^[^(]+\(/, '').replace(/\);?$/, '');
      var data = JSON.parse(json);
      processData(data);
    })
    .catch(function() {
      showError('לא ניתן לטעון את הנתונים. נסה שוב.');
    });
}

function processData(data) {
  var rows = data.table.rows;
  if (!rows || rows.length === 0) { showError('לא נמצאו נתונים.'); return; }

  // כותרות מגיעות מ-cols ב-gviz API
  var headers = [];
  data.table.cols.forEach(function(col) {
    headers.push(col && col.label ? String(col.label).trim() : '');
  });

  var audienceIdx = headers.indexOf('קהל יעד');
  var waGroupIdx  = headers.indexOf('קישור ווטסאפ');

  if (audienceIdx === -1 || waGroupIdx === -1) {
    showError('לא נמצאו עמודות "קהל יעד" / "קישור ווטסאפ" בשיט.');
    return;
  }

  // מצא קישורים לקהל היעד המבוקש
  var links = [];
  rows.slice(1).forEach(function(row) {
    if (!row.c) return;
    var aud  = row.c[audienceIdx] && row.c[audienceIdx].v ? String(row.c[audienceIdx].v).trim() : '';
    var link = row.c[waGroupIdx]  && row.c[waGroupIdx].v  ? String(row.c[waGroupIdx].v).trim()  : '';
    if (aud === audience && link && links.indexOf(link) === -1) links.push(link);
  });

  if (links.length === 0) {
    showError('לא נמצאה קבוצת ווטסאפ עבור "' + audience + '".');
    return;
  }

  if (links.length === 0) {
    showError('כל הקבוצות עבור "' + audience + '" מלאות כרגע. פנה לצוות לפתיחת קבוצה חדשה.');
    return;
  }
  if (links.length === 1) {
    showRedirect(links[0]);
  } else {
    showChoice(links);
  }
}

function showRedirect(item) {
  var badge = AUDIENCE_BADGE[audience] || 'badge-blue';
  var label = AUDIENCE_LABEL[audience] || audience;
  var statusNote = item.status === 'כמעט מלאה' ? '<div style="color:#f7c94f;font-size:13px;margin-bottom:16px">⚠️ הקבוצה כמעט מלאה</div>' : '';
  document.getElementById('card').innerHTML =
    '<div class="logo">💬</div>' +
    '<span class="badge ' + badge + '">' + audience + '</span>' +
    '<div class="title">' + (item.name || label) + '</div>' +
    statusNote +
    '<div class="subtitle">מיד תועבר/י אוטומטית לקבוצה.<br>אם לא קרה כלום — לחץ/י על הכפתור.</div>' +
    '<a class="btn-wa" href="' + item.link + '" target="_blank">' +
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>' +
      'הצטרפות לקבוצה' +
    '</a>';
  setTimeout(function() { window.location.href = item.link; }, 1500);
}

function showChoice(items) {
  var badge = AUDIENCE_BADGE[audience] || 'badge-blue';
  var btns = items.map(function(item, i) {
    var statusNote = item.status === 'כמעט מלאה' ? ' ⚠️' : '';
    return '<a class="btn-wa" href="' + item.link + '" target="_blank" style="margin:6px auto;display:flex;max-width:280px;">' +
      (item.name || 'קבוצה ' + (i + 1)) + statusNote + '</a>';
  }).join('');
  document.getElementById('card').innerHTML =
    '<div class="logo">💬</div>' +
    '<span class="badge ' + badge + '">' + audience + '</span>' +
    '<div class="title">בחר/י קבוצה</div>' +
    '<div class="subtitle">יש מספר קבוצות עבור קהל זה.<br>בחר/י את הקבוצה הרלוונטית.</div>' +
    btns;
}

function showError(msg) {
  document.getElementById('card').innerHTML =
    '<div class="logo">⚠️</div>' +
    '<div class="title">לא נמצאה קבוצה</div>' +
    '<div class="err">' + msg + '</div>';
}
</script>
</body>
</html>
